name: Python Runtime Tests

on:
  push:
    branches: [main]
    paths:
      - "miqi/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "miqi/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run portable and subprocess tests
        run: uv run pytest -q -m "not sandbox"

  bwrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv and bubblewrap
        run: |
          python -m pip install uv
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Check bwrap availability
        id: bwrap-check
        run: |
          if bwrap --version >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::bwrap unavailable — sandbox tests will be skipped"
          fi
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run sandbox tests
        if: steps.bwrap-check.outputs.available == 'true'
        run: uv run pytest -q -m "sandbox and bwrap" --suppress-no-test-exit-code --tb=short
