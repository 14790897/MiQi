name: Python Runtime Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "miqi/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"
      - "apps/desktop/tests/e2e/**"
  pull_request:
    paths:
      - "miqi/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"
      - "apps/desktop/tests/e2e/**"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run portable and subprocess tests
        run: uv run pytest -q -m "not sandbox and not wsl" --tb=short

  bwrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv and bubblewrap
        run: |
          python -m pip install uv
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Check bwrap availability
        id: bwrap-check
        run: |
          if bwrap --version && bwrap --ro-bind / / /bin/true; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "bwrap is not usable on this runner; skipping bwrap-only tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run sandbox tests
        if: steps.bwrap-check.outputs.available == 'true'
        run: |
          set +e
          uv run pytest -q -m "sandbox and bwrap"
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No sandbox+bwrap tests matched; treating as skipped."
            exit 0
          fi
          exit "$status"

  wsl-sandbox:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install WSL Ubuntu distro
        shell: pwsh
        run: |
          Write-Host "Installing WSL Ubuntu..."
          wsl --install -d Ubuntu --no-launch
          Write-Host "WSL distro list:"
          wsl -l -v

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run WSL sandbox tests (auto-install)
        run: uv run pytest -q -m "wsl" --tb=long -v

      - name: Run WSL sandbox tests (bwrap integration)
        run: uv run pytest -q -m "sandbox and bwrap" --tb=long -v

  wsl-e2e:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - name: Install WSL Ubuntu distro
        shell: pwsh
        run: |
          Write-Host "Installing WSL Ubuntu..."
          wsl --install -d Ubuntu --no-launch
          Write-Host "WSL distro list:"
          wsl -l -v

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          npm ci
          pip install uv
          cd ../.. && uv sync

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build renderer
        run: npm run build

      - name: Generate config.json
        run: |
          mkdir -p ~/.miqi
          cat > ~/.miqi/config.json << 'CONFEOF'
          {
            "providers": {
              "siliconflow": {
                "apiKey": "${{ secrets.DEEPSEEK_API_KEY }}",
                "apiBase": "${{ secrets.DEEPSEEK_API_BASE }}",
                "extraHeaders": null
              }
            },
            "agents": {
              "defaults": {
                "model": "deepseek-v4-pro",
                "maxTokens": 8000,
                "temperature": 0.1,
                "maxToolIterations": 10,
                "runtime": "app_server"
              },
              "commandApproval": { "enabled": false }
            },
            "tools": {
              "web": {
                "search": { "provider": "brave", "apiKey": "${{ secrets.BRAVE_API_KEY }}", "maxResults": 3 },
                "fetch": { "provider": "builtin" }
              },
              "exec": { "timeout": 30, "envPassthrough": [] }
            }
          }
          CONFEOF

      - name: Run sandbox E2E tests (WSL)
        run: |
          npx playwright test --config=playwright.config.ts --project=electron -g "sandbox"
        env:
          MIQI_RUN_SANDBOX_E2E: '1'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_BASE: ${{ secrets.DEEPSEEK_API_BASE }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
