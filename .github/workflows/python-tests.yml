name: Python Runtime Tests

on:
  push:
    branches: [main]
    paths:
      - "miqi/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "miqi/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-tests.yml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run portable and subprocess tests
        run: uv run pytest -q -m "not sandbox" --tb=short

  bwrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv and bubblewrap
        run: |
          python -m pip install uv
          sudo apt-get update
          sudo apt-get install -y bubblewrap
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Check bwrap availability
        id: bwrap-check
        run: |
          if bwrap --version && bwrap --ro-bind / / /bin/true; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "bwrap is not usable on this runner; skipping bwrap-only tests."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run sandbox tests
        if: steps.bwrap-check.outputs.available == 'true'
        run: |
          set +e
          uv run pytest -q -m "sandbox and bwrap"
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No sandbox+bwrap tests matched; treating as skipped."
            exit 0
          fi
          exit "$status"
