name: Issue 模板校验

on:
  issues:
    types: [opened, edited]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 校验 Issue 模板是否完整填写
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            let body = context.payload.issue.body || '';
            const issueNumber = context.issue.number;
            const repo = context.repo;

            // 统一换行符：\r\n → \n，避免 Windows 行尾导致正则匹配失败
            body = body.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            // 去掉 HTML 注释（<!-- xxx -->）
            const withoutComments = body.replace(/<!--[\s\S]*?-->/g, '').trim();

            // 跳过 feature 请求（校验规则不同）
            if (context.payload.issue.title?.startsWith('[FEATURE]')) {
              console.log('Feature request — 跳过 bug 模板校验');
              return;
            }

            const failures = [];

            // ── 必填字段检查 ──────────────────────────────────────

            // 1. Bug 描述
            {
              const m = withoutComments.match(/### Bug 描述\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              if (!val || val.length < 10) {
                failures.push('Bug 描述：未填写或内容过短（需至少 10 个字符）');
              }
            }

            // 2. 环境（diagnostic 日志）—— 必须替换掉模板默认值
            {
              const m = withoutComments.match(/### 环境\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              const hasDiagnostic = val && val.includes('MIQI DIAGNOSTIC') && val.includes('END DIAGNOSTIC');
              const stillDefault = val?.includes('运行上方命令后将输出粘贴到这里');
              if (!val || val.length < 30 || !hasDiagnostic || stillDefault) {
                failures.push('环境信息：必须运行 diagnose 脚本并将完整输出粘贴到此处');
              }
            }

            // 3. 复现步骤 —— 必须替换掉模板默认值
            {
              const m = withoutComments.match(/### 复现步骤\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              // 过滤只有数字列表标记的空行
              const actualSteps = val?.split('\n').filter(l => {
                const trimmed = l.replace(/^\d+\.\s*/, '').trim();
                return trimmed.length > 0;
              }).join('\n').trim();
              if (!actualSteps || actualSteps.length < 20) {
                failures.push('复现步骤：必须填写具体操作步骤');
              }
            }

            // 4. 复现频率
            {
              const m = withoutComments.match(/### 复现频率\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              if (!val || !['必现', '偶现', '特定'].some(kw => val.includes(kw))) {
                failures.push('复现频率：必须填写（必现/偶现/特定条件下必现）');
              }
            }

            // 5. 期望行为
            {
              const m = withoutComments.match(/### 期望行为\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              if (!val || val.length < 10) {
                failures.push('期望行为：未填写');
              }
            }

            // 6. 实际行为
            {
              const m = withoutComments.match(/### 实际行为\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              if (!val || val.length < 10) {
                failures.push('实际行为：未填写');
              }
            }

            // 7. 日志 —— 最关键的字段，必须不为空
            {
              const m = withoutComments.match(/### 日志\s*\n+(.+?)(?=\n###|\n*$)/s);
              const val = m?.[1]?.trim();
              if (!val || val.length < 20) {
                failures.push('日志：必须粘贴完整的报错日志或堆栈信息');
              }
            }

            // ── 结果处理 ──────────────────────────────────────────

            if (failures.length > 0) {
              const comment = [
                '### ⚠️ Issue 信息不完整',
                '',
                '以下必填项未正确填写，请 **编辑此 Issue** 补充后重新提交：',
                '',
                ...failures.map((f, i) => `${i + 1}. ❌ ${f}`),
                '',
                '> 💡 提示：请查看 [Bug 报告指南](https://github.com/14790897/miqi/blob/main/.github/ISSUE_TEMPLATE/bug_report.yml) 了解每项的具体要求。',
              ].join('\n');

              await github.rest.issues.createComment({
                ...repo,
                issue_number: issueNumber,
                body: comment,
              });

              // 添加 "incomplete" 标签
              try {
                await github.rest.issues.addLabels({
                  ...repo,
                  issue_number: issueNumber,
                  labels: ['incomplete'],
                });
              } catch {}

              console.log(`[校验失败] ${failures.length} 项未通过:\n${failures.join('\n')}`);
            } else {
              console.log('[校验通过] 所有必填项已完整填写');
            }

      - name: AI 审核日志真实性
        env:
          DEEPSEEK_API_BASE: ${{ secrets.DEEPSEEK_API_BASE }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = context.repo;

            let body = context.payload.issue.body || '';
            body = body.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            // 提取各字段
            function extractSection(label) {
              const m = body.match(new RegExp('### ' + label + '\\s*\\n+(.+?)(?=\\n###|\\n*$)', 's'));
              return m?.[1]?.trim() || '';
            }

            const description = extractSection('Bug 描述');
            const environment  = extractSection('环境');
            const steps        = extractSection('复现步骤');
            const logs         = extractSection('日志');

            // 构建 AI 审核 prompt
            const reviewPrompt = [
              '你是一个 Bug Report 审核助手。请审查以下 Issue 中的"日志"字段是否真实、有效。',
              '',
              '审核标准：',
              '1. 日志是否像真实的程序输出（包含路径、堆栈、时间戳、错误码等）？',
              '2. 日志是否与 Bug 描述和复现步骤关联？',
              '3. 日志是否明显是占位符、伪造、或不相关的内容？',
              '4. 环境信息（diagnostic）是否完整合理？',
              '',
              '请用简短中文回复，格式如下：',
              '---',
              '真实性: ✅ 真实 / ⚠️ 存疑 / ❌ 明显伪造',
              '理由: (1-2句话)',
              '建议: (如有需要改进的地方)',
              '---',
              '',
              '=== Issue 内容 ===',
              `Bug 描述: ${description}`,
              `环境: ${environment}`,
              `复现步骤: ${steps}`,
              `日志: ${logs}`,
            ].join('\n');

            // 截断过长内容（保留完整结构）
            const MAX_PROMPT = 8000;
            const truncated = reviewPrompt.length > MAX_PROMPT
              ? reviewPrompt.substring(0, MAX_PROMPT - 100) + '\n...(内容过长已截断)'
              : reviewPrompt;

            const apiBase = process.env.DEEPSEEK_API_BASE || 'https://api.deepseek.com';
            const apiKey = process.env.DEEPSEEK_API_KEY;

            if (!apiKey) {
              console.log('[AI 审核] 未配置 DEEPSEEK_API_KEY，跳过');
              return;
            }

            try {
              const response = await fetch(`${apiBase}/chat/completions`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  Authorization: `Bearer ${apiKey}`,
                },
                body: JSON.stringify({
                  model: 'deepseek-chat',
                  messages: [
                    { role: 'system', content: '你是一个严谨的 Bug Report 审核助手。只根据给定的事实判断，不猜测。回复简洁。' },
                    { role: 'user', content: truncated },
                  ],
                  temperature: 0.1,
                  max_tokens: 3500,
                }),
              });

              if (!response.ok) {
                const errText = await response.text();
                console.error(`[AI 审核] API 调用失败 (${response.status}): ${errText}`);
                return;
              }

              const data = await response.json();
              const aiResult = data.choices?.[0]?.message?.content || '';

              console.log(`[AI 审核] 结果:\n${aiResult}`);

              // 解析结果
              const hasFake = aiResult.includes('❌');
              const hasSuspicious = aiResult.includes('⚠️');

              const comment = [
                '### 🤖 AI 日志审核',
                '',
                aiResult,
                '',
                hasFake || hasSuspicious
                  ? '> ⚠️ AI 检测到日志可能存在问题，请维护者人工复核。'
                  : '> ✅ AI 审核通过，日志看起来真实可信。',
              ].join('\n');

              await github.rest.issues.createComment({
                ...repo,
                issue_number: issueNumber,
                body: comment,
              });

              if (hasFake) {
                try {
                  await github.rest.issues.addLabels({
                    ...repo,
                    issue_number: issueNumber,
                    labels: ['ai:logs-suspicious'],
                  });
                } catch {}
              }
            } catch (err) {
              console.error(`[AI 审核] 异常: ${err.message}`);
            }
