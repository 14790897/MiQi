name: Build and Release

on:
  push:
    branches: [electronUI]
    tags: [v*]
  pull_request:
    branches: [electronUI]

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build app
        working-directory: apps/desktop
        run: npm run build

      - name: Create dummy miqi-bridge.exe
        run: |
          New-Item -Path "dist" -ItemType Directory -Force | Out-Null
          New-Item -Path "dist/miqi-bridge.exe" -ItemType File -Force | Out-Null
        working-directory: ${{ github.workspace }}

      - name: Package Electron app
        working-directory: apps/desktop
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miqi-desktop-build
          path: dist-new/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-new/*.exe
            dist-new/*.zip
          name: Release ${{ github.ref_name }}
          body: |
            ## MiQi Desktop ${{ github.ref_name }}

            Automated release from GitHub Actions pipeline.

            **Downloads:**
            - Windows Installer: `MiQi Desktop Setup *.exe`
            - Windows Portable: `MiQi Desktop *.exe`
            - Windows Zip: `MiQi Desktop *.zip`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
