name: Build

on:
  # 监听 semantic-release workflow 完成后触发
  workflow_run:
    workflows: ["Semantic Release"]
    types:
      - completed
    branches: [main, develop]

permissions:
  contents: write
  packages: read

jobs:
  build:
    # 仅在 release workflow 成功时构建
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Build miqi-bridge.exe
        run: uv run pyinstaller miqi.spec

      - name: Install Electron dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Electron app
        working-directory: apps/desktop
        run: npm run build

      - name: Package Electron app
        working-directory: apps/desktop
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release info
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            if (!releases.length) {
              core.setFailed('No release found. semantic-release may have skipped this run.');
              return;
            }
            const release = releases[0];
            core.info(`Latest release: ${release.tag_name} (id=${release.id})`);
            core.setOutput('tag_name', release.tag_name);
            core.setOutput('upload_url', release.upload_url);
            core.setOutput('html_url', release.html_url);

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          files: |
            dist-new/*.exe
            dist-new/*.msi
            dist-new/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
