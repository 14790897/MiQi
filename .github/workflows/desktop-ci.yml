name: Desktop CI

on:
  push:
    branches: [develop]
  pull_request_target:
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: 快速检查 — TypeScript + 单元测试 + mock smoke (无 API key)
  # ────────────────────────────────────────────────────────────
  quick:
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-quick
      cancel-in-progress: true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build -- --logLevel warn

      - name: Unit tests (vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Mock smoke tests (Playwright)
        run: npx playwright test --config=playwright.config.ts --project=smoke --quiet
        continue-on-error: true  # flaky in headless, don't block

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2: Electron E2E — 完整桌面应用 + 真实 bridge + LLM
  # ────────────────────────────────────────────────────────────
  electron-e2e:
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-electron-e2e
      cancel-in-progress: true
    # Fork PRs only get secrets if the author is a collaborator.
    # if: |
    #   github.event_name == 'push' ||
    #   github.event_name == 'workflow_dispatch' ||
    #   github.event.pull_request.head.repo.full_name == github.repository ||
    #   contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          pip install uv
          uv sync
          sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build renderer
        run: npm run build -- --logLevel warn

      - name: Generate config.json
        run: |
          mkdir -p ~/.miqi
          cat > ~/.miqi/config.json << 'CONFEOF'
          {
            "providers": {
              "siliconflow": {
                "apiKey": "${{ secrets.DEEPSEEK_API_KEY }}",
                "apiBase": "${{ secrets.DEEPSEEK_API_BASE }}",
                "extraHeaders": null
              }
            },
            "agents": {
              "defaults": {
                "model": "deepseek-v4-pro",
                "maxTokens": 8000,
                "temperature": 0.1,
                "maxToolIterations": 10,
                "runtime": "app_server"
              },
              "commandApproval": { "enabled": false }
            },
            "tools": {
              "web": {
                "search": {
                  "provider": "brave",
                  "apiKey": "${{ secrets.BRAVE_API_KEY }}",
                  "maxResults": 3
                },
                "fetch": { "provider": "builtin" }
              },
              "exec": { "timeout": 30, "envPassthrough": [] }
            }
          }
          CONFEOF

      - name: Run Electron E2E
        run: |
          xvfb-run --auto-servernum \
            npx playwright test --config=playwright.config.ts --project=electron
        timeout-minutes: 30

      - name: Upload Playwright report (E2E)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e
          path: apps/desktop/test-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 3: macOS Electron E2E — 完整 macOS 桌面应用 + bridge + LLM
  # ────────────────────────────────────────────────────────────
  macos-e2e:
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-macos-e2e
      cancel-in-progress: true
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          pip install uv
          uv sync

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build renderer
        run: npm run build -- --logLevel warn

      - name: Generate config.json
        run: |
          mkdir -p ~/.miqi
          cat > ~/.miqi/config.json << 'CONFEOF'
          {
            "providers": {
              "siliconflow": {
                "apiKey": "${{ secrets.DEEPSEEK_API_KEY }}",
                "apiBase": "${{ secrets.DEEPSEEK_API_BASE }}",
                "extraHeaders": null
              }
            },
            "agents": {
              "defaults": {
                "model": "deepseek-v4-pro",
                "maxTokens": 8000,
                "temperature": 0.1,
                "maxToolIterations": 10,
                "runtime": "app_server"
              },
              "commandApproval": { "enabled": false }
            },
            "tools": {
              "web": {
                "search": {
                  "provider": "brave",
                  "apiKey": "${{ secrets.BRAVE_API_KEY }}",
                  "maxResults": 3
                },
                "fetch": { "provider": "builtin" }
              },
              "exec": { "timeout": 30, "envPassthrough": [] }
            }
          }
          CONFEOF

      - name: Run Electron E2E (macOS)
        run: |
          npx playwright test --config=playwright.config.ts --project=electron \
            --grep-invert "Sandbox Exec|session-key-mapping|PPTX Generator"
        timeout-minutes: 30

      - name: Upload Playwright report (macOS E2E)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-macos-e2e
          path: apps/desktop/test-results/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # macOS packaging smoke — 验证 Mac 包能否构建
  # ────────────────────────────────────────────────────────────
  macos-build:
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}-macos-build
      cancel-in-progress: true
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci
          pip install uv
          cd ../..
          uv sync

      - name: Build miqi-bridge
        working-directory: .
        run: uv run pyinstaller miqi.spec

      - name: Build Electron app
        working-directory: apps/desktop
        run: npm run build

      - name: Package macOS app
        working-directory: apps/desktop
        run: npx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miqi-desktop-macos
          path: |
            dist-new/*.dmg
            dist-new/*-mac.zip
          retention-days: 7
