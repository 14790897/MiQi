name: PR Title Check (main)

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefix = /^(feat|fix|perf|refactor|docs|style|test|build|ci|chore|revert)(\(.+\))?!?: /;
            if (!validPrefix.test(title)) {
              core.setFailed(
                `PR 标题必须以语义前缀开头，如 "feat: ..." 或 "fix: ..."\n` +
                `当前标题: "${title}"\n` +
                `允许的前缀: feat, fix, perf, refactor, docs, style, test, build, ci, chore, revert`
              );
            } else {
              console.log(`✅ PR 标题符合规范: "${title}"`);
            }
