appId: com.miqi.desktop
productName: MiQi Desktop
directories:
  output: ../../dist-new
files:
  - out/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: src/renderer/assets/icon.ico
    to: icon.ico
  - from: src/renderer/assets/icon.icns
    to: icon.icns
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: src/renderer/assets/icon.ico
  extraResources:
    - from: ../../dist/miqi-bridge.exe
      to: miqi-bridge.exe
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: src/renderer/assets/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: platform/entitlements.mac.plist
  entitlementsInherit: platform/entitlements.mac.inherit.plist
  darkModeSupport: true
  extraResources:
    - from: ../../dist/miqi-bridge
      to: miqi-bridge
nsis:
  perMachine: true
  oneClick: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  - provider: generic
    url: ""
