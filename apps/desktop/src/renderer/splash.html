<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>MiQi</title>
<style>
*{margin:0;padding:0}html,body{width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center}
img{max-width:100%;max-height:100%}
@keyframes reveal{0%{opacity:0;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}100%{opacity:1;transform:scale(1)}}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:0.85}}
img{animation:reveal 1.5s ease-out forwards,breathe 2s 1.5s ease-in-out infinite}
</style></head>
<body>
<img src="./splash-final.png" alt="MiQi">
</body>
</html>
