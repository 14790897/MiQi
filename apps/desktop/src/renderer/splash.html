<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>MiQi</title>
<style>
*{margin:0;padding:0}html,body{width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center}
img{max-width:100%;max-height:100%}
@media(prefers-reduced-motion:reduce){img{animation:none}}
</style></head>
<body>
<img src="./reference-splash.gif" alt="MiQi">
<script>
// Start timer when GIF is painted, not when JS executes
var img = document.querySelector('img');
img.onload = function() {
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      // 19 frames × 80ms + 1580ms hold = 3020ms from first painted frame
      setTimeout(function(){document.title='DONE'}, 3020);
    });
  });
};
// Fallback: if GIF fails to load, still signal after 4s
img.onerror = function() {
  setTimeout(function(){document.title='DONE'}, 4000);
};
</script>
</body>
</html>
